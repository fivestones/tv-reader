<input id="Right" class="flat-btn" type="submit" value="Right" /><br>
<input id="Left" class="flat-btn" type="submit" value="Left" /><br>
<input id="Shift" class="flat-btn" type="submit" value="Shift" />

<script>
    let connected = 0;

    // Connect to the websocket on the same host that served this page
    let socket = new WebSocket("ws://" + window.location.hostname + ":55559");

    socket.onopen = function(e) {
        console.log("[open] Connection established");
        connected = 1;
        // console.log("Sending to server");
        // socket.send("My name is John");
    };

    document.querySelector('#Right').addEventListener('click', e => {
        if (connected == 1) {
            console.log("Sending to server");
            console.log("Right")
            socket.send('Right');
        }
    });

    document.querySelector('#Left').addEventListener('click', e => {
        if (connected == 1) {
            console.log("Sending to server");
            console.log("Left")
            socket.send('Left');
        }
    });

    document.querySelector('#Shift').addEventListener('click', e => {
        if (connected == 1) {
            console.log("Sending to server");
            console.log("Shift")
            socket.send('s');
        }
    });
